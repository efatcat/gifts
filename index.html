<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Кейс Симулятор</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(22, 26, 35, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 24px 20px 30px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 215, 150, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .balance-panel {
      background: #0f1119;
      border-radius: 60px;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      border: 1px solid #4b3e5c;
      box-shadow: 0 8px 0 #0a0c12;
      width: fit-content;
      margin-top: 10px;
    }

    .coin-icon {
      background: #f0d54e;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #3d330c;
      box-shadow: 0 0 12px #f5c542;
    }

    .balance-text {
      color: #ffe9a0;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 5px black;
    }

    .currency-name {
      color: #c4aa60;
      font-size: 0.9rem;
      margin-left: 4px;
      font-weight: 600;
    }

    .cases-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      width: 100%;
      margin-bottom: 24px;
    }

    .case-card {
      background: #202433;
      border-radius: 28px;
      padding: 20px 10px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(180, 160, 255, 0.25);
      box-shadow: 0 12px 18px rgba(0,0,0,0.5);
      transition: transform 0.15s ease;
      cursor: pointer;
      position: relative;
    }

    .case-card:active {
      transform: scale(0.96);
    }

    .image-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .case-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: drop-shadow(0 8px 8px black);
    }

    .fallback-icon {
      font-size: 4rem;
      display: none;
      text-align: center;
    }

    .case-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #e9e1d4;
      text-align: center;
      margin-bottom: 6px;
    }

    .case-price {
      background: #262237;
      border-radius: 30px;
      padding: 6px 20px;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ffe9a0;
      margin-top: 4px;
      border: 1px solid #5e4e40;
    }

    .ad-badge {
      background: #3e2e4e;
      color: #d4bfff;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .inventory-title {
      color: #cccdd8;
      font-weight: 600;
      margin: 16px 0 10px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .inventory-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 5px 15px;
      width: 100%;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      min-height: 85px;
      align-items: center;
      scrollbar-width: thin;
      scrollbar-color: #8e7ab5 #1f1f2b;
    }

    .inventory-item {
      background: #262b38;
      border-radius: 18px;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 70px;
      border: 1px solid #494e5c;
      box-shadow: 0 4px 8px rgba(0,0,0,0.6);
    }

    .item-emoji {
      font-size: 2rem;
    }

    .item-count {
      color: #cbbaee;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .toast-message {
      color: #ffe9a0;
      font-weight: 600;
      margin-top: 16px;
      min-height: 24px;
      font-size: 0.9rem;
      text-align: center;
    }

    .reset-button {
      background: none;
      border: 1px solid #5a4e6e;
      color: #b9aad8;
      padding: 8px 24px;
      border-radius: 40px;
      margin-top: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .reset-button:hover {
      background: #2f2a3a;
      color: #e0ccff;
    }

    button {
      background: transparent;
      border: none;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="balance-panel">
    <div class="coin-icon">⭐</div>
    <div><span class="balance-text" id="balanceDisplay">1250</span><span class="currency-name">звёзд</span></div>
  </div>

  <div class="cases-grid" id="casesContainer">
    </div>

  <div class="inventory-title">
    <span>🎒 ИНВЕНТАРЬ</span> <span style="font-size:0.8rem; opacity:0.7;">(нажми на кейс)</span>
  </div>
  <div class="inventory-scroll" id="inventoryContainer">
  </div>

  <div class="toast-message" id="toastMessage"></div>
  <button class="reset-button" id="resetGameBtn">🔄 Сбросить прогресс</button>
</div>

<script>
  (function() {
    // ---------- ВАЛЮТА: ЗВЁЗДЫ ----------
    const CURRENCY = "звёзд";
    
    // ---------- СОСТОЯНИЕ ИГРЫ ----------
    let playerBalance = 1250;

    // Инвентарь
    let inventory = new Map();

    // ---------- ДАННЫЕ КЕЙСОВ (изображения из папки pngs) ----------
    const cases = [
      {
        id: 'mud',
        name: 'Грязевой',
        image: 'pngs/mud_case.png',
        price: 204,
        priceType: 'currency',
        color: '#6b5e4a',
        items: [
          { name: 'Грязный самоцвет', emoji: '💎🟤', weight: 40 },
          { name: 'Болотная монета', emoji: '🪙🌿', weight: 35 },
          { name: 'Осколок лужи', emoji: '💧', weight: 15 },
          { name: 'Тина-амулет', emoji: '🍃💧', weight: 10 }
        ]
      },
      {
        id: 'metal',
        name: 'Металлический',
        image: 'pngs/metal_case.png',
        price: 0,
        priceType: 'ad',
        color: '#7b8a9c',
        items: [
          { name: 'Железный болт', emoji: '🔩', weight: 45 },
          { name: 'Медная шестерня', emoji: '⚙️', weight: 30 },
          { name: 'Стальной слиток', emoji: '🧱✨', weight: 15 },
          { name: 'Хромированный ключ', emoji: '🔑', weight: 10 }
        ]
      },
      {
        id: 'rare',
        name: 'Редкий',
        image: 'pngs/rare_case.png',
        price: 422,
        priceType: 'currency',
        color: '#b8864b',
        items: [
          { name: 'Радужный кристалл', emoji: '💎🌈', weight: 35 },
          { name: 'Золотая крошка', emoji: '✨🟡', weight: 25 },
          { name: 'Свиток мудрости', emoji: '📜', weight: 20 },
          { name: 'Редкий самоцвет', emoji: '💠', weight: 12 },
          { name: 'Печатка силы', emoji: '💍⚡', weight: 8 }
        ]
      },
      {
        id: 'nature',
        name: 'Природный',
        image: 'pngs/nature_case.png',
        price: 588,
        priceType: 'currency',
        color: '#5e7a4a',
        items: [
          { name: 'Лесной орех', emoji: '🌰', weight: 30 },
          { name: 'Цветочный мёд', emoji: '🍯🌸', weight: 25 },
          { name: 'Янтарная смола', emoji: '🍂✨', weight: 20 },
          { name: 'Корень женьшеня', emoji: '🥕🌿', weight: 15 },
          { name: 'Изумрудный лист', emoji: '🍃💚', weight: 10 }
        ]
      }
    ];

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function getRandomItemByWeight(items) {
      const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
      let randomNum = Math.random() * totalWeight;
      for (let item of items) {
        if (randomNum < item.weight) {
          return item;
        }
        randomNum -= item.weight;
      }
      return items[items.length - 1];
    }

    function addToInventory(itemName, itemEmoji) {
      const key = `${itemEmoji} ${itemName}`;
      inventory.set(key, (inventory.get(key) || 0) + 1);
    }

    function showToast(text, isGood = true) {
      const toast = document.getElementById('toastMessage');
      if (toast) {
        toast.textContent = text;
        toast.style.color = isGood ? '#ffe9a0' : '#ff8a7a';
        setTimeout(() => {
          if (toast.textContent === text) {
            toast.textContent = '';
          }
        }, 2500);
      }
    }

    function updateUI() {
      document.getElementById('balanceDisplay').textContent = playerBalance;
      renderInventory();
    }

    function renderInventory() {
      const container = document.getElementById('inventoryContainer');
      if (!container) return;
      container.innerHTML = '';
      
      if (inventory.size === 0) {
        container.innerHTML = '<div style="color:#7f8499; padding:10px; width:100%; text-align:center;">Пока пусто 🎁</div>';
        return;
      }

      for (let [itemKey, count] of inventory.entries()) {
        const parts = itemKey.split(' ');
        const emojiPart = parts[0] || '🎁';
        
        const itemDiv = document.createElement('div');
        itemDiv.className = 'inventory-item';
        itemDiv.innerHTML = `
          <span class="item-emoji">${emojiPart}</span>
          <span class="item-count">${count} шт.</span>
        `;
        container.appendChild(itemDiv);
      }
    }

    function openCase(caseData) {
      if (caseData.priceType === 'currency') {
        if (playerBalance < caseData.price) {
          showToast(`Недостаточно звёзд! Нужно ${caseData.price} ${CURRENCY}`, false);
          return false;
        }
        playerBalance -= caseData.price;
      } else if (caseData.priceType === 'ad') {
        showToast('📺 Реклама просмотрена! Открываем Металлический кейс...', true);
      }

      const wonItem = getRandomItemByWeight(caseData.items);
      if (!wonItem) return false;

      addToInventory(wonItem.name, wonItem.emoji);
      showToast(`✨ Вы получили: ${wonItem.emoji} ${wonItem.name}!`, true);
      updateUI();
      return true;
    }

    function handleCaseClick(caseData) {
      if (!caseData) return;
      openCase(caseData);
    }

    function renderCases() {
      const container = document.getElementById('casesContainer');
      if (!container) return;
      container.innerHTML = '';

      cases.forEach(caseItem => {
        const card = document.createElement('div');
        card.className = 'case-card';
        card.style.background = `linear-gradient(135deg, #232837 0%, ${caseItem.color}40 100%)`;
        
        let priceHTML = '';
        if (caseItem.priceType === 'ad') {
          priceHTML = `<div class="ad-badge">📱 РЕКЛАМА</div>`;
        } else {
          priceHTML = `<div class="case-price"><span>⭐</span> ${caseItem.price} ${CURRENCY}</div>`;
        }

        card.innerHTML = `
          <div class="image-wrapper">
            <img src="${caseItem.image}" alt="${caseItem.name}" class="case-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="fallback-icon">📦</div>
          </div>
          <div class="case-name">${caseItem.name}</div>
          ${priceHTML}
        `;
        
        card.addEventListener('click', (e) => {
          e.stopPropagation();
          handleCaseClick(caseItem);
        });
        
        container.appendChild(card);
      });
    }

    function resetGame() {
      playerBalance = 1250;
      inventory.clear();
      updateUI();
      showToast('🔄 Игра сброшена. Баланс: 1250 звёзд', true);
    }

    function bindEvents() {
      const resetBtn = document.getElementById('resetGameBtn');
      if (resetBtn) {
        resetBtn.addEventListener('click', resetGame);
      }
    }

    function initGame() {
      // Стартовые предметы
      inventory.set('💎🟤 Грязный самоцвет', 1);
      inventory.set('🔩 Железный болт', 2);
      
      renderCases();
      updateUI();
      bindEvents();
      showToast('Добро пожаловать! Выбирай кейс ⭐', true);
    }

    window.addEventListener('DOMContentLoaded', initGame);
  })();
</script>
</body>
</html>
